        }
      }

      async function refreshWeatherAndOutfit() {
        const ok = await fetchWeather();
        if (ok && state.items.length) generateOneOutfit({ requireDifferent: true });
      }

      async function fetchWeather(options = {}) {
        const city = dom.cityInput.value.trim();
        if (!city) {
          showToast("请输入城市名。", "warn");
          return false;
        }
        setButtonLoading(dom.fetchWeatherBtn, true, "获取中");
        try {
          const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=zh`;
          const response = await fetchWithTimeout(url, {}, 12000);
          if (!response.ok) throw new Error("天气服务返回异常");
          const data = await response.json();
          const current = data.current_condition?.[0];
          if (!current) throw new Error("天气数据格式不完整");
          const desc = current.lang_zh?.[0]?.value || current.weatherDesc?.[0]?.value || "未知天气";
          state.weather = {
            city,
            tempC: Number(current.temp_C),
            desc,
            type: normalizeWeather(desc),
            humidity: current.humidity || "--",
            windKmph: current.windspeedKmph || "--"
          };
          state.settings.city = city;
          saveSettings();
          renderWeather();
          if (!options.silent) showToast(`已获取 ${city} 天气。`);
          return true;
        } catch (error) {
          if (!options.silent) showToast("天气获取失败，请检查城市名或网络。", "error");
          return false;
        } finally {
          setButtonLoading(dom.fetchWeatherBtn, false, "获取天气");
        }
      }

      function generateOneOutfit(options = {}) {
        if (!state.items.length) {
          state.currentOutfit = null;
          renderCurrentOutfit();
          return;
        }
        if (!state.weather) state.weather = createFallbackWeather();
        const previousSignature = state.currentOutfit?.signature || "";
        let plan = null;
        let attempts = 0;
        do {
          state.generationIndex += 1;
          plan = createOutfitPlan(buildRecommendationContext(), state.generationIndex);
          attempts += 1;
        } while (
          options.requireDifferent &&
          plan?.complete &&
          plan.signature === previousSignature &&
          attempts < 12
        );

        if (options.requireDifferent && plan?.signature === previousSignature && !options.silent) {
          showToast("可用组合有限，已尽量换成不同搭配。", "warn");
        }
        setCurrentOutfit(plan, options.silent);
      }

      function setCurrentOutfit(plan, silent = false) {
        dom.outfitStage.classList.add("is-switching");
        window.setTimeout(() => {
          state.currentOutfit = plan;
          renderCurrentOutfit();
          requestAnimationFrame(() => dom.outfitStage.classList.remove("is-switching"));
          if (!silent && plan?.complete) showToast("已生成新的今日穿搭。");
        }, 150);
      }

      function buildRecommendationContext() {
        const tempProfile = getTemperatureProfile(state.weather.tempC);
        const scene = SCENES.find((item) => item.label === state.settings.scene) || SCENES[0];
        const weatherProfile = getWeatherProfile(state.weather.type);
        return {
          weather: state.weather,
          tempProfile,
          scene,
          keywords: [...tempProfile.prefer, ...scene.keywords, ...weatherProfile.prefer],
          avoid: [...tempProfile.avoid, ...weatherProfile.avoid],
          needsOuter: tempProfile.needsOuter || state.weather.type === "雨"
        };
      }

      function createOutfitPlan(context, offset) {
        const slots = [];
        const used = new Set();
        const missing = [];
        const isHome = context.scene.label === "居家";
        const isSport = context.scene.label === "运动";
        const preferDress = shouldUseDress(context, offset);

        if (preferDress) {
          const dress = pickItem("连衣裙", context, used, offset);
          if (dress) addSlot(slots, used, "连衣裙", dress);
          else missing.push(getMissingSuggestion("连衣裙", context));
        }

        if (!preferDress || !slots.some((slot) => slot.slot === "连衣裙")) {
          const top = pickItem("上衣", context, used, offset);
          const bottom = pickItem("下装", context, used, offset + 1);
          if (top) addSlot(slots, used, "上衣", top);
          else missing.push(getMissingSuggestion("上衣", context));
          if (bottom) addSlot(slots, used, "下装", bottom);
          else missing.push(getMissingSuggestion("下装", context));
        }

        if (context.needsOuter && !isHome) {
          const outer = pickItem("外套", context, used, offset);
          if (outer) addSlot(slots, used, "外套", outer);
          else missing.push(getMissingSuggestion("外套", context));
        }

        if (!isHome) {
          const shoes = pickItem("鞋履", context, used, offset);
          if (shoes) addSlot(slots, used, "鞋履", shoes);
          else missing.push(getMissingSuggestion("鞋履", context));
        }

        if (!isHome && !isSport) {
          const accessory = pickItem("配饰", context, used, offset);
          if (accessory) addSlot(slots, used, "配饰", accessory);
        }

        const hasBody = slots.some((slot) => slot.slot === "连衣裙") || (slots.some((slot) => slot.slot === "上衣") && slots.some((slot) => slot.slot === "下装"));
        const hasShoes = isHome || slots.some((slot) => slot.slot === "鞋履");
        const hasOuterIfNeeded = isHome || !context.needsOuter || slots.some((slot) => slot.slot === "外套");
        const complete = hasBody && hasShoes && hasOuterIfNeeded;
        const signature = outfitSignature(slots.map((slot) => slot.item));
        return {
          id: createId("outfit"),
          title: complete ? "今日推荐" : "暂缺关键单品",
          slots,
          itemIds: slots.map((slot) => slot.item.id),
          signature,
          complete,
          reason: complete ? buildReason(slots, context) : "补齐缺少的类别后，就能生成完整穿搭。",
          scene: context.scene.label,
          weatherType: context.weather.type,
          temperatureRange: context.tempProfile.range,
          missingSuggestions: unique(missing)
        };
      }

      function addSlot(slots, used, slot, item) {
        slots.push({ slot, item });
        used.add(item.id);
      }

      function shouldUseDress(context, offset) {
        if (context.scene.label === "运动") return false;
        const hasDress = state.items.some((item) => item.category === "连衣裙");
        const lacksTopOrBottom = !state.items.some((item) => item.category === "上衣") || !state.items.some((item) => item.category === "下装");
        const sceneLikesDress = ["约会", "度假", "派对"].includes(context.scene.label);
        return hasDress && (lacksTopOrBottom || sceneLikesDress || offset % 3 === 0);
      }

      function pickItem(category, context, used, offset) {
        /* 推荐前先执行硬过滤，确保不适合当前温度/场景的单品不会被选中。 */
        const ranked = state.items
          .filter((item) => item.category === category)
          .filter((item) => !getBlockReason(item, context))
          .map((item) => ({ item, score: scoreItem(item, context) }))
          .sort((a, b) => b.score - a.score);
        if (!ranked.length) return null;
        const available = ranked.filter((entry) => !used.has(entry.item.id));
        const pool = available.length ? available : ranked;
        return pool[offset % pool.length].item;
      }

      function scoreItem(item, context) {
        const text = `${item.name} ${item.tags.join(" ")}`.toLowerCase();
        let score = 40;
        context.keywords.forEach((keyword) => {
          if (text.includes(keyword.toLowerCase())) score += 10;
        });
        context.avoid.forEach((keyword) => {
          if (text.includes(keyword.toLowerCase())) score -= 12;
        });
        if (context.weather.type === "雨" && item.category === "外套") score += 9;
        if (context.weather.type === "雨" && /白色|浅色|丝绸|麂皮/.test(text)) score -= 10;
        if (context.weather.type === "晴" && /浅色|白色|防晒|帽/.test(text)) score += 8;
        if (context.scene.label === "运动" && /运动|速干|透气|弹力|短裤|t恤|T恤|卫衣|运动鞋|跑步/.test(`${item.name} ${item.tags.join(" ")}`)) score += 18;
        if (context.scene.label === "居家" && /舒适|柔软|宽松|棉|居家|针织/.test(`${item.name} ${item.tags.join(" ")}`)) score += 14;
        if (context.scene.label === "上班" && /乐福|平底|小白鞋|低跟|短靴|通勤/.test(`${item.name} ${item.tags.join(" ")}`)) score += 10;
        if (context.weather.tempC >= 20 && item.warmLevel <= 2) score += 8;
        if (context.weather.tempC < 10 && item.warmLevel >= 4) score += 8;
        score += favoriteScoreForItem(item.id);
        return score;
      }

      /* 精细化规则：返回阻止推荐的原因；没有原因则表示该单品可参与推荐。 */
      function getBlockReason(item, context) {
        const text = itemText(item);
        if (context.weather.tempC >= 20 && isWinterHeavyItem(item)) {
          return "20℃以上不推荐冬季厚衣物";
        }
        if (context.scene.label === "运动") {
          if (item.category === "连衣裙" || /半身裙|短裙|连衣裙|裙/.test(text)) return "运动场景不推荐裙装";
          if (/牛仔/.test(text)) return "运动场景不推荐牛仔裤";
          if (item.category === "鞋履" && /凉鞋|拖鞋|高跟|细跟|粗跟|坡跟/.test(text)) return "运动场景不推荐凉鞋、拖鞋或高跟鞋";
          if (item.category === "配饰" || /项链|耳环|耳饰|围巾|手套|毛线帽/.test(text)) return "运动场景不推荐配饰";
        }
        if (context.scene.label === "居家") {
          if (item.category === "鞋履") return "居家场景不推荐鞋履";
          if (item.category === "配饰") return "居家场景不推荐配饰";
        }
        if (context.scene.label === "上班" && item.category === "鞋履" && /高跟|细跟|粗跟|坡跟/.test(text)) {
          return "上班场景不推荐高跟鞋";
        }
        return "";
      }

      function isWinterHeavyItem(item) {
        const text = itemText(item);
        return /羽绒服|羽绒|棉服|派克|派克大衣|厚毛衣|高领毛衣|羊绒衫|羊绒|加绒裤|加绒|棉裤|雪地靴|加绒靴|围巾|手套|毛线帽/.test(text)
          || (item.season === "冬" && item.warmLevel >= 4)
          || item.warmLevel >= 5;
      }

      function getMissingSuggestion(category, context) {
        const allInCategory = state.items.filter((item) => item.category === category);
        const blockedReasons = unique(allInCategory.map((item) => getBlockReason(item, context)).filter(Boolean));
        if (context.scene.label === "运动") {
          if (category === "鞋履") return "运动场景需要运动鞋，衣橱里还没有合适的，建议添加一双！";
          if (category === "下装") return "运动场景需要运动裤或短裤，牛仔裤和裙装先休息一下。";
          if (category === "上衣") return "运动场景需要 T 恤、卫衣或速干上衣，建议补一件轻便上衣。";
        }
        if (context.scene.label === "居家") {
          if (category === "上衣" || category === "下装" || category === "连衣裙") return "居家场景只挑舒适衣物，建议补充柔软宽松的单品。";
        }
        if (context.scene.label === "上班" && category === "鞋履") {
          return "上班场景会避开高跟鞋，建议添加乐福鞋、平底鞋、小白鞋或低跟短靴。";
        }
        if (context.weather.tempC >= 20 && blockedReasons.length) {
          return `${context.weather.tempC >= 30 ? "炎热天气" : "20℃以上"}不推荐厚重冬季单品，建议添加薄款${category}。`;
        }
        if (category === "外套") return context.weather.type === "雨" ? "雨天建议添加一件防水外套。" : "当前温度建议添加一件轻便外套。";
        return `缺少合适的${category}，建议添加一件。`;
      }

      function buildReason(slots, context) {
        const names = slots.map((slot) => slot.item.name).join("、");
        const tempText = `${Math.round(context.weather.tempC)}℃`;
        const sceneText = context.scene.label;
        const sceneLine = sceneText === "上班"
          ? "整体偏简约利落，适合通勤。"
          : sceneText === "约会"
            ? "保留了精致和设计感，适合轻松但有存在感的造型。"
            : sceneText === "度假"
              ? "优先考虑舒适和轻盈感，适合移动与拍照。"
              : "搭配会优先照顾当前场景的舒适度和辨识度。";
        return `${names} 适合 ${context.weather.type}、${tempText} 的天气。${sceneLine}`;
      }

      function openReplaceSheet(slotName) {
        if (!state.currentOutfit?.complete) return;
        const currentSlot = state.currentOutfit.slots.find((slot) => slot.slot === slotName);
        if (!currentSlot) return;
        const items = state.items.filter((item) => item.category === slotName);
        dom.replaceTitle.textContent = `替换${slotName}`;
        dom.replaceNote.textContent = `从 ${items.length} 件${slotName}中选择一件替换当前单品。`;
        if (!items.length) {
          dom.replaceGrid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
              <div>
                <h3>暂无可替换单品</h3>
                <p>先在衣橱里添加${slotName}，再回来替换。</p>
              </div>
            </div>
          `;
        } else {
          dom.replaceGrid.innerHTML = items.map((item) => `
            <button class="replace-card ${item.id === currentSlot.item.id ? "is-active" : ""}" type="button" data-replace-slot="${escapeHtml(slotName)}" data-replace-item="${escapeHtml(item.id)}">
              <img src="${item.image}" alt="${escapeHtml(item.name)}">
              <strong>${escapeHtml(item.name)}</strong>
            </button>
          `).join("");
        }
        dom.replaceDialog.showModal();
      }

      function replaceOutfitItem(slotName, itemId) {
        if (!state.currentOutfit) return;
        const item = state.items.find((entry) => entry.id === itemId);
        if (!item) return;
        state.currentOutfit.slots = state.currentOutfit.slots.map((slot) => slot.slot === slotName ? { ...slot, item } : slot);
        state.currentOutfit.itemIds = state.currentOutfit.slots.map((slot) => slot.item.id);
        state.currentOutfit.signature = outfitSignature(state.currentOutfit.slots.map((slot) => slot.item));
        state.currentOutfit.reason = buildReason(state.currentOutfit.slots, buildRecommendationContext());
        dom.replaceDialog.close();
        renderCurrentOutfit();
        showToast("已替换单品。");
      }

      function favoriteCurrentOutfit() {
        if (!state.currentOutfit?.complete) {
          showToast("当前还没有完整穿搭可收藏。", "warn");
          return;
        }
        triggerBounce(dom.favoriteCurrentBtn);
        const exists = state.favorites.some((favorite) => favorite.signature === state.currentOutfit.signature);
        if (exists) {
          showToast("这套穿搭已经收藏过了。", "warn");
          return;
        }
        state.favorites.unshift({
          id: createId("favorite"),
          itemIds: state.currentOutfit.itemIds,
          items: state.currentOutfit.slots.map((slot) => ({
            id: slot.item.id,
            name: slot.item.name,
            category: slot.item.category,
            image: slot.item.image,
            slot: slot.slot
          })),
          signature: state.currentOutfit.signature,
          weather: state.weather,
          scene: state.settings.scene,
          createdAt: new Date().toISOString()
        });
        saveFavorites();
        renderHeaderMeta();
        renderFavorites();
        showToast("已收藏这套穿搭。");
      }

      function applyFavorite(id) {
        const favorite = state.favorites.find((entry) => entry.id === id);
        if (!favorite) return;
        const slots = favorite.itemIds
          .map((itemId) => state.items.find((item) => item.id === itemId))
          .filter(Boolean)
          .map((item) => ({ slot: item.category, item }));
        if (slots.length !== favorite.itemIds.length) {
          showToast("这套收藏里有单品已被删除，无法完整应用。", "warn");
          return;
        }
        state.weather = favorite.weather || state.weather || createFallbackWeather();
        state.settings.city = state.weather.city || state.settings.city;
        state.settings.scene = favorite.scene || state.settings.scene;
        state.settings.scenes = [state.settings.scene];
        state.currentOutfit = {
          id: createId("outfit"),
          title: "收藏穿搭",
          slots,
          itemIds: favorite.itemIds,
          signature: favorite.signature,
          complete: true,
          reason: buildReason(slots, buildRecommendationContext()),
          scene: state.settings.scene,
          weatherType: state.weather.type,
          temperatureRange: getTemperatureProfile(state.weather.tempC).range,
          missingSuggestions: []
        };
        saveSettings();
        renderAll();
        showToast("已应用收藏穿搭。");
      }

      async function deleteFavorite(id) {
        const ok = await confirmAction({
          title: "删除收藏",
          message: "确定删除这条收藏穿搭吗？衣橱单品不会被删除。",
          confirmText: "删除"
        });
        if (!ok) return;
        state.favorites = state.favorites.filter((favorite) => favorite.id !== id);
        saveFavorites();
        renderHeaderMeta();
        renderFavorites();
        showToast("收藏已删除。");
      }

      function exportData() {
        /* 导出当前衣橱、收藏和设置，生成可迁移的 JSON 备份文件。 */
        dom.dataMenu.classList.remove("is-open");
        const payload = {
          version: 3,
          exportedAt: new Date().toISOString(),
          items: state.items,
          favorites: state.favorites,
          settings: state.settings
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `衣橱数据_${formatDate(new Date().toISOString())}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast("衣橱备份已导出。");
      }

      async function handleImportFile(file) {
        /* 导入会覆盖本地数据，所以先解析校验，再通过确认弹窗拦一次。 */
        dom.dataMenu.classList.remove("is-open");
        try {
          const text = await file.text();
          const raw = JSON.parse(text);
          const imported = normalizeBackup(raw);
          const ok = await confirmAction({
            title: "导入数据",
            message: `导入将覆盖当前所有数据，检测到 ${imported.items.length} 件衣服和 ${imported.favorites.length} 套收藏，确认继续吗？`,
            confirmText: "确认导入"
          });
          if (!ok) return;
          localStorage.setItem(STORAGE_KEYS.items, JSON.stringify(imported.items));
          localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(imported.favorites));
          localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(imported.settings));
          localStorage.removeItem("aiWardrobe.feedback");
          showToast("导入成功，正在刷新页面。");
          window.setTimeout(() => window.location.reload(), 450);
        } catch (error) {
          showToast("文件格式不正确，请选择正确的备份文件。", "error");
        }
      }

      async function clearAllData() {
        /* 一键清空属于高风险操作，必须通过二次确认后才会删除本地数据。 */
        dom.dataMenu.classList.remove("is-open");
        const ok = await confirmAction({
          title: "一键清空",
          message: "确定清空所有衣服和收藏穿搭吗？这个操作不能撤回。",
          confirmText: "确认清空"
        });
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEYS.items);
        localStorage.removeItem(STORAGE_KEYS.favorites);
        localStorage.removeItem("aiWardrobe.feedback");
        state.items = [];
        state.favorites = [];
        state.currentOutfit = null;
        showToast("衣橱已清空，正在刷新页面。");
        window.setTimeout(() => window.location.reload(), 450);
      }

      function normalizeBackup(raw) {
        const items = normalizeItems(raw.items || []);
        const favorites = normalizeFavorites(raw.favorites || raw.favoriteOutfits || []);
        const settings = normalizeSettings(raw.settings || {});
        if (!items.length && (!Array.isArray(raw.items) || raw.items.length)) throw new Error("invalid items");
        return { items, favorites, settings };
      }

      async function handleFileBatch(fileList) {
        const files = Array.from(fileList || []).filter((file) => file.type.startsWith("image/"));
        dom.fileInput.value = "";
        if (!files.length) {
          showToast("请选择有效的图片文件。", "warn");
          return;
        }
        resetProgress();
        appendStatus(`开始处理 ${files.length} 张图片。`);
        for (let index = 0; index < files.length; index += 1) {
          const file = files[index];
          setProgress(index + 1, files.length, `正在处理第 ${index + 1}/${files.length} 件：${file.name}`);
          try {
            const dataUrl = await readFileAsDataUrl(file);
            const image = await processImage(dataUrl);
            const draft = await openItemDialog({
              mode: "create",
              name: cleanFileName(file.name),
              category: guessCategory(file.name),
              tags: guessTags(file.name),
              image
            });
            if (draft) {
              state.items.unshift(draft);
              saveItems();
              appendStatus(`已保存：${draft.name}`, "success");
              renderAll();
              if (!state.currentOutfit || !state.currentOutfit.complete) generateOneOutfit({ requireDifferent: false, silent: true });
            } else {
              appendStatus(`已跳过：${file.name}`);
            }
          } catch (error) {
            appendStatus(`处理失败：${file.name}。${error.message}`, "error");
            showToast(`处理 ${file.name} 失败。`, "error");
          }
        }
        setProgress(files.length, files.length, `批量处理完成，共 ${files.length} 件。`);
      }

      async function editItem(id) {
        const item = state.items.find((entry) => entry.id === id);
        if (!item) return;
        closeCardMenus();
        const updated = await openItemDialog({
          mode: "edit",
          item
        });
        if (!updated) return;
        state.items = state.items.map((entry) => entry.id === id ? updated : entry);
        if (state.currentOutfit) {
          if (item.category !== updated.category && state.currentOutfit.itemIds.includes(id)) {
            state.currentOutfit = null;
          } else {
            state.currentOutfit.slots = state.currentOutfit.slots.map((slot) => slot.item.id === id ? { ...slot, item: updated } : slot);
            state.currentOutfit.itemIds = state.currentOutfit.slots.map((slot) => slot.item.id);
            state.currentOutfit.signature = outfitSignature(state.currentOutfit.slots.map((slot) => slot.item));
            state.currentOutfit.reason = state.currentOutfit.complete ? buildReason(state.currentOutfit.slots, buildRecommendationContext()) : state.currentOutfit.reason;
          }
        }
        saveItems();
        renderAll();
        if (!state.currentOutfit && state.items.length) generateOneOutfit({ requireDifferent: false, silent: true });
        showToast("衣服信息已更新。");
      }

      async function deleteItem(id) {
        const item = state.items.find((entry) => entry.id === id);
        if (!item) return;
        closeCardMenus();
        const ok = await confirmAction({
          title: "删除衣服",
          message: `确定删除「${item.name}」吗？收藏穿搭中如果引用了它，将无法完整应用。`,
          confirmText: "删除"
        });
        if (!ok) return;
        state.items = state.items.filter((entry) => entry.id !== id);
        if (state.currentOutfit?.itemIds.includes(id)) state.currentOutfit = null;
        saveItems();
        renderAll();
        if (state.items.length) generateOneOutfit({ requireDifferent: false, silent: true });
        showToast("衣服已删除。");
      }

      function openItemDialog(context) {
        return new Promise((resolve) => {
          const isEdit = context.mode === "edit";
          const sourceItem = context.item || {};
          const image = isEdit ? sourceItem.image : context.image;
          dom.itemDialogTitle.textContent = isEdit ? "编辑衣服" : "确认衣服信息";
          dom.itemDialogNote.textContent = isEdit ? "修改后会自动更新衣橱和当前穿搭。" : "选择分类并添加标签，标签会参与后续穿搭推荐。";
          dom.itemPreview.src = image;
          dom.itemNameInput.value = isEdit ? sourceItem.name : context.name;
          dom.itemCategorySelect.value = isEdit ? sourceItem.category : context.category;
          dom.itemTagsInput.value = (isEdit ? sourceItem.tags : context.tags || []).join(", ");
          dom.itemSeasonSelect.value = isEdit ? sourceItem.season || inferSeason(sourceItem) : inferSeason({ ...context, tags: context.tags || [] });
          dom.itemWarmLevelInput.value = isEdit ? sourceItem.warmLevel || inferWarmLevel(sourceItem) : inferWarmLevel(context);
          dom.warmLevelValue.textContent = dom.itemWarmLevelInput.value;

          const cleanup = () => {
            dom.itemForm.removeEventListener("submit", handleSubmit);
            dom.itemCancelBtn.removeEventListener("click", handleCancel);
            dom.itemDialog.removeEventListener("cancel", handleCancel);
          };
          const finish = (value) => {
            cleanup();
            dom.itemDialog.close();
            resolve(value);
          };
          const handleCancel = (event) => {
            event?.preventDefault();
            finish(null);
          };
          const handleSubmit = (event) => {
            event.preventDefault();
            const now = new Date().toISOString();
            const payload = {
              id: isEdit ? sourceItem.id : createId("item"),
              name: dom.itemNameInput.value.trim() || "未命名单品",
              category: dom.itemCategorySelect.value,
              tags: splitTags(dom.itemTagsInput.value),
              season: dom.itemSeasonSelect.value,
              warmLevel: Number(dom.itemWarmLevelInput.value),
              image,
              source: isEdit ? sourceItem.source || "upload" : "upload",
              sourceUrl: isEdit ? sourceItem.sourceUrl || "" : "",
              createdAt: isEdit ? sourceItem.createdAt || now : now,
              updatedAt: now
            };
            finish(payload);
          };

          dom.itemForm.addEventListener("submit", handleSubmit);
          dom.itemCancelBtn.addEventListener("click", handleCancel);
          dom.itemDialog.addEventListener("cancel", handleCancel);
          dom.itemDialog.showModal();
          dom.itemNameInput.focus();
        });
      }

      function toggleCardMenu(card) {
        const shouldOpen = card && !card.classList.contains("is-menu-open");
        closeCardMenus();
        if (shouldOpen) card.classList.add("is-menu-open");
      }

      function closeCardMenus() {
        dom.closetGrid.querySelectorAll(".is-menu-open").forEach((card) => card.classList.remove("is-menu-open"));
      }

      async function processImage(source) {
        const image = await loadImage(source);
        const canvas = document.createElement("canvas");
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;
        const ctx = canvas.getContext("2d");
        const padding = 54;
        const imageSize = CANVAS_SIZE - padding * 2;
        const cropSize = Math.min(image.width, image.height);
        const sx = (image.width - cropSize) / 2;
        const sy = (image.height - cropSize) / 2;

        /* 统一背景、阴影、圆角和亮度，让不同来源图片在衣橱网格中保持同一质感。 */
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        ctx.save();
        ctx.shadowColor = "rgba(45, 45, 45, 0.16)";
        ctx.shadowBlur = 32;
        ctx.shadowOffsetY = 18;
        ctx.fillStyle = "#FFFFFF";
        roundedRect(ctx, padding, padding, imageSize, imageSize, 42);
        ctx.fill();
        ctx.restore();

        ctx.save();
        roundedRect(ctx, padding, padding, imageSize, imageSize, 42);
        ctx.clip();
        ctx.filter = "brightness(1.05) contrast(1.04) saturate(1.03)";
        ctx.drawImage(image, sx, sy, cropSize, cropSize, padding, padding, imageSize, imageSize);
        ctx.filter = "none";
        ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
        ctx.fillRect(padding, padding, imageSize, imageSize);
        ctx.restore();

        try {
          return canvas.toDataURL("image/jpeg", 0.88);
        } catch (error) {
          throw new Error("图片无法处理，请换一张本地图片");
        }
      }

      function roundedRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function loadImage(source) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片加载失败"));
          image.src = source;
        });
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("文件读取失败"));
          reader.readAsDataURL(file);
        });
      }

      function resetProgress() {
        dom.progressBox.hidden = false;
        dom.progressFill.style.width = "0%";
        dom.progressText.textContent = "准备处理。";
      }

      function setProgress(current, total, text) {
        const percent = total ? Math.round(current / total * 100) : 0;
        dom.progressBox.hidden = false;
        dom.progressFill.style.width = `${percent}%`;
        dom.progressText.textContent = text;
      }

      function appendStatus(text, type = "") {
        const li = document.createElement("li");
        li.className = `status-item ${type}`.trim();
        li.textContent = text;
        dom.statusList.prepend(li);
        while (dom.statusList.children.length > 20) dom.statusList.lastElementChild.remove();
      }

      function getTemperatureProfile(tempC) {
        if (tempC >= 30) {
          return {
            range: "30℃以上",
            prefer: ["短袖", "短裤", "连衣裙", "薄款", "透气", "凉鞋", "浅色", "夏季"],
            avoid: ["厚", "羊毛", "羽绒", "保暖"],
            needsOuter: false
          };
        }
        if (tempC >= 20) {
          return {
            range: "20-30℃",
            prefer: ["薄款", "长裤", "半身裙", "衬衫", "T恤", "休闲", "舒适"],
            avoid: ["羽绒", "厚"],
            needsOuter: false
          };
        }
        if (tempC >= 10) {
          return {
            range: "10-20℃",
            prefer: ["长袖", "外套", "长裤", "针织", "防风", "通勤"],
            avoid: ["凉鞋", "短裤"],
            needsOuter: true
          };
        }
        return {
          range: "10℃以下",
          prefer: ["厚", "外套", "毛衣", "羊毛", "长裤", "靴", "保暖", "冬季"],
          avoid: ["凉鞋", "短袖", "薄款"],
          needsOuter: true
        };
      }

      function getWeatherProfile(type) {
        if (type === "雨") {
          return { prefer: ["防水", "雨天", "靴", "深色", "外套"], avoid: ["白色", "浅色", "丝绸", "麂皮"] };
        }
        if (type === "晴") {
          return { prefer: ["浅色", "防晒", "帽", "亮色", "透气"], avoid: [] };
        }
        if (type === "雪") {
          return { prefer: ["保暖", "厚", "靴", "羊毛", "冬季"], avoid: ["凉鞋", "薄款"] };
        }
        return { prefer: ["舒适", "防风"], avoid: [] };
      }

      function normalizeWeather(desc) {
        const text = String(desc).toLowerCase();
        if (/雨|rain|shower|drizzle/.test(text)) return "雨";
        if (/雪|snow|sleet/.test(text)) return "雪";
        if (/晴|sun|clear/.test(text)) return "晴";
        if (/云|cloud|overcast|阴|mist|fog/.test(text)) return text.includes("阴") || text.includes("overcast") ? "阴" : "多云";
        return "多云";
      }

      function createFallbackWeather() {
        return {
          city: state.settings.city || "Shanghai",
          tempC: 24,
          desc: "天气暂不可用",
          type: "多云",
          humidity: "--",
          windKmph: "--"
        };
      }

      function splitTags(value) {
        return unique(String(value || "")
          .split(/[，,、\s]+/)
          .map((tag) => tag.trim())
          .filter(Boolean))
          .slice(0, 16);
      }

      function guessCategory(text) {
        const value = String(text).toLowerCase();
        if (/裙|dress/.test(value)) return "连衣裙";
        if (/外套|风衣|大衣|夹克|羽绒|coat|jacket|blazer/.test(value)) return "外套";
        if (/裤|半身裙|短裤|长裤|pants|jeans|skirt/.test(value)) return "下装";
        if (/鞋|靴|sneaker|shoe|boot|凉鞋/.test(value)) return "鞋履";
        if (/帽|包|耳|项链|围巾|belt|bag|hat|scarf|accessory/.test(value)) return "配饰";
        return "上衣";
      }

      function guessTags(text) {
        const dictionary = ["白色", "黑色", "灰色", "蓝色", "粉色", "米色", "短袖", "长袖", "短裤", "长裤", "薄款", "厚", "通勤", "正式", "休闲", "运动", "约会", "度假", "派对", "防水", "保暖", "棉", "羊毛", "亚麻", "牛仔", "浅色", "深色"];
        return dictionary.filter((keyword) => String(text).includes(keyword));
      }

      function itemText(item) {
        return `${item?.name || ""} ${item?.category || ""} ${(item?.tags || []).join(" ")}`.toLowerCase();
      }

      /* 旧数据没有季节字段时，根据名称、分类和标签做轻量推断，避免推荐逻辑丢失上下文。 */
      function inferSeason(item) {
        const text = itemText(item);
        if (/羽绒|棉服|派克|羊绒|羊毛|加绒|雪地|毛线|手套|围巾|厚|保暖|冬/.test(text)) return "冬";
        if (/短袖|短裤|凉鞋|防晒|亚麻|薄款|夏/.test(text)) return "夏";
        if (/风衣|针织|开衫|春|秋/.test(text)) return "春";
        return "四季";
      }

      /* 保暖等级 1-5：越厚越暖。推荐规则会用它过滤高温下的冬季单品。 */
      function inferWarmLevel(item) {
        const text = itemText(item);
        if (/羽绒|棉服|派克|雪地|加绒|棉裤|厚大衣/.test(text)) return 5;
        if (/羊绒|羊毛|毛衣|高领|大衣|保暖|厚/.test(text)) return 4;
        if (/外套|风衣|针织|卫衣|长袖|长裤|牛仔/.test(text)) return 3;
        if (/短袖|衬衫|薄款|半身裙|连衣裙|运动裤/.test(text)) return 2;
        if (/凉鞋|短裤|背心|防晒/.test(text)) return 1;
        return item?.category === "外套" ? 3 : 2;
      }

      function clampWarmLevel(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return 2;
        return Math.min(5, Math.max(1, Math.round(number)));
      }

      function cleanFileName(name) {
        return String(name).replace(/\.[^.]+$/, "").replace(/[-_]+/g, " ").trim().slice(0, 48) || "未命名单品";
      }

      function favoriteScoreForItem(itemId) {
        return state.favorites.reduce((score, favorite) => favorite.itemIds.includes(itemId) ? score + 4 : score, 0);
      }

      function fetchWithTimeout(resource, options = {}, timeout = 10000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);
        return fetch(resource, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
      }

      function setButtonLoading(button, isLoading, label) {
        button.disabled = isLoading;
        button.innerHTML = isLoading ? `<span class="loading-dot" aria-hidden="true"></span>${escapeHtml(label)}` : escapeHtml(label);
      }

      function triggerBounce(element) {
        element.classList.remove("is-bouncing");
        void element.offsetWidth;
        element.classList.add("is-bouncing");
        window.setTimeout(() => element.classList.remove("is-bouncing"), 460);
      }

      function showToast(message, type = "success") {
        const toast = document.createElement("div");
        toast.className = `toast ${type === "success" ? "" : type}`.trim();
        toast.textContent = message;
        dom.toastStack.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(8px)";
          setTimeout(() => toast.remove(), 180);
        }, 3400);
      }

      function confirmAction({ title, message, confirmText }) {
        return new Promise((resolve) => {
          dom.confirmTitle.textContent = title;
          dom.confirmMessage.textContent = message;
          dom.confirmOkBtn.textContent = confirmText || "确认";
          const cleanup = () => {
            dom.confirmCancelBtn.removeEventListener("click", cancel);
            dom.confirmOkBtn.removeEventListener("click", ok);
            dom.confirmDialog.removeEventListener("cancel", cancel);
          };
          const finish = (value) => {
            cleanup();
            dom.confirmDialog.close();
            resolve(value);
          };
          const cancel = (event) => {
            event?.preventDefault();
            finish(false);
          };
          const ok = () => finish(true);
          dom.confirmCancelBtn.addEventListener("click", cancel);
          dom.confirmOkBtn.addEventListener("click", ok);
          dom.confirmDialog.addEventListener("cancel", cancel);
          dom.confirmDialog.showModal();
        });
      }

      function normalizeItems(rawItems) {
        if (!Array.isArray(rawItems)) return [];
        const now = new Date().toISOString();
        return rawItems
          .filter((item) => item && ITEM_CATEGORIES.includes(item.category) && typeof item.image === "string")
          .map((item) => {
            const normalized = {
              id: typeof item.id === "string" ? item.id : createId("item"),
              name: String(item.name || "未命名单品").slice(0, 48),
              category: item.category,
              tags: Array.isArray(item.tags) ? item.tags.map(String).filter(Boolean).slice(0, 16) : splitTags(item.tags),
              image: item.image,
              source: item.source || "upload",
              sourceUrl: item.sourceUrl || "",
              createdAt: item.createdAt || now,
              updatedAt: item.updatedAt || now
            };
            normalized.season = ["春", "夏", "秋", "冬", "四季"].includes(item.season) ? item.season : inferSeason(normalized);
            normalized.warmLevel = clampWarmLevel(item.warmLevel || inferWarmLevel(normalized));
            return normalized;
          });
      }

      function normalizeSettings(settings) {
        const raw = settings && typeof settings === "object" ? settings : {};
        const scene = typeof raw.scene === "string"
          ? raw.scene
          : Array.isArray(raw.scenes) && raw.scenes[0]
            ? raw.scenes[0]
            : "上班";
        const validScene = SCENES.some((item) => item.label === scene) ? scene : "上班";
        return {
          city: typeof raw.city === "string" && raw.city.trim() ? raw.city.trim() : "Shanghai",
          unit: "C",
          scene: validScene,
          scenes: [validScene]
        };
      }

      function normalizeFavorites(rawFavorites) {
        if (!Array.isArray(rawFavorites)) return [];
        return rawFavorites
          .filter((favorite) => favorite && Array.isArray(favorite.itemIds))
          .map((favorite) => {
            const snapshots = Array.isArray(favorite.items) ? favorite.items : [];
            return {
              id: typeof favorite.id === "string" ? favorite.id : createId("favorite"),
              itemIds: favorite.itemIds.map(String),
              items: snapshots
                .filter((item) => item && typeof item.id === "string" && typeof item.image === "string")
                .map((item) => ({
                  id: item.id,
                  name: String(item.name || "收藏单品").slice(0, 48),
                  category: ITEM_CATEGORIES.includes(item.category) ? item.category : "配饰",
                  image: item.image,
                  slot: item.slot || item.category || "单品"
                })),
              signature: favorite.signature || favorite.itemIds.map(String).sort().join("|"),
              weather: favorite.weather || null,
              scene: favorite.scene || "上班",
              createdAt: favorite.createdAt || new Date().toISOString()
            };
          });
      }

      function syncInputsFromSettings() {
        if (document.activeElement !== dom.cityInput) dom.cityInput.value = state.settings.city || "Shanghai";
      }

      function loadJson(key, fallback) {
        try {
          const value = localStorage.getItem(key);
          return value ? JSON.parse(value) : fallback;
        } catch (error) {
          return fallback;
        }
      }

      function saveItems() {
        safeSet(STORAGE_KEYS.items, state.items);
      }

      function saveSettings() {
        state.settings.scenes = [state.settings.scene];
        safeSet(STORAGE_KEYS.settings, state.settings);
      }

      function saveFavorites() {
        safeSet(STORAGE_KEYS.favorites, state.favorites);
      }

      function safeSet(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (error) {
          showToast("本地存储空间不足，建议删除部分图片后再试。", "error");
        }
      }

      function createId(prefix) {
        return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
      }

      function unique(list) {
        return Array.from(new Set(list.filter(Boolean)));
      }

      function outfitSignature(items) {
        return items.map((item) => item.id).sort().join("|");
      }

      function formatDate(value) {
        const date = value ? new Date(value) : new Date();
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      function cssEscape(value) {
        if (window.CSS?.escape) return CSS.escape(value);
        return String(value).replace(/"/g, '\\"');
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    })();
  </script>
</body>
