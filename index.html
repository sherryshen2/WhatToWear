<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Outfit of The Day</title>
  <style>
    :root {
      --ink: #2D2D2D;
      --paper: #FFFFFF;
      --warm: #E8D5B7;
      --warm-deep: #E8D5B7;
      --mist: #FFFFFF;
      --line: #E8D5B7;
      --muted: #2D2D2D;
      --sage: #2D2D2D;
      --rose: #2D2D2D;
      --blue: #2D2D2D;
      --shadow: 0 22px 58px rgba(45, 45, 45, 0.10);
      --soft-shadow: 0 12px 32px rgba(45, 45, 45, 0.12);
      --radius: 22px;
      --soft-radius: 18px;
      --image-radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      color: var(--ink);
      background: var(--mist);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(232, 213, 183, 0.34), rgba(255, 255, 255, 0) 300px),
        var(--mist);
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    img {
      display: block;
      max-width: 100%;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .app-shell {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .top-nav {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      padding: 16px 18px;
      border: 1px solid rgba(45, 45, 45, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .top-nav h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-weight: 820;
      letter-spacing: 0;
      color: var(--ink);
      text-shadow: none;
    }

    .nav-meta {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
      line-height: 1.5;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(460px, 1.08fr);
      gap: 18px;
      align-items: start;
    }

    .module {
      min-width: 0;
      border: 1px solid rgba(45, 45, 45, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      animation: fadeIn 0.34s ease both;
    }

    .module-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .module-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 800;
    }

    .module-note {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: var(--paper);
      color: var(--ink);
      font-weight: 760;
      line-height: 1.2;
      white-space: nowrap;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--soft-shadow);
    }

    .button.primary {
      background: var(--ink);
      color: var(--paper);
    }

    .button.secondary {
      border-color: var(--line);
      background: var(--paper);
    }

    .button.warm {
      background: var(--warm);
      color: var(--ink);
    }

    .button.danger {
      background: var(--ink);
      color: var(--paper);
    }

    .button.is-bouncing {
      animation: popBounce 0.42s ease both;
    }

    .button.ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .loading-dot {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.78s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
    }

    @keyframes popBounce {
      0% {
        transform: scale(1);
      }
      38% {
        transform: scale(1.08) translateY(-2px);
      }
      100% {
        transform: scale(1);
      }
    }

    .text-input,
    .select-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      outline: 0;
      padding: 10px 12px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .text-input:focus,
    .select-input:focus {
      border-color: var(--warm-deep);
      box-shadow: 0 0 0 4px rgba(232, 213, 183, 0.45);
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
    }

    .closet-body,
    .outfit-body {
      padding: 18px;
    }

    .upload-panel {
      position: relative;
      overflow: visible;
      display: grid;
      gap: 12px;
      margin-top: 12px;
      margin-bottom: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(232, 213, 183, 0.26));
    }

    .upload-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
    }

    .upload-panel-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .data-menu {
      position: relative;
      flex: 0 0 auto;
    }

    .data-menu-trigger {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(45, 45, 45, 0.08);
    }

    .data-menu-panel {
      position: absolute;
      top: 44px;
      right: 0;
      z-index: 8;
      min-width: 182px;
      display: none;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: var(--paper);
      box-shadow: var(--soft-shadow);
    }

    .data-menu.is-open .data-menu-panel {
      display: grid;
      animation: fadeIn 0.18s ease both;
    }

    .data-menu-panel button {
      min-height: 40px;
      padding: 10px 12px;
      background: var(--paper);
      text-align: left;
      font-size: 14px;
    }

    .data-menu-panel button:hover {
      background: rgba(232, 213, 183, 0.28);
    }

    .data-menu-divider {
      height: 1px;
      background: var(--line);
      margin: 4px 0;
    }

    .data-menu-panel .danger-text {
      color: var(--rose);
    }

    .drop-zone {
      min-height: 142px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 2px dashed rgba(45, 45, 45, 0.22);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.66), rgba(232, 213, 183, 0.24)),
        rgba(232, 213, 183, 0.22);
      padding: 18px;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .drop-zone.is-dragging {
      border-color: var(--ink);
      background: rgba(232, 213, 183, 0.32);
      transform: translateY(-2px) rotate(-0.4deg);
    }

    .drop-zone strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .drop-zone span {
      color: var(--muted);
      line-height: 1.6;
    }

    .hidden-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .progress-box {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
    }

    .progress-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(232, 213, 183, 0.42);
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--ink);
      transition: width 0.22s ease;
    }

    .progress-text {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-list {
      display: grid;
      gap: 8px;
      max-height: 156px;
      overflow: auto;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .status-item {
      padding: 8px 10px;
      border-radius: var(--radius);
      background: rgba(45, 45, 45, 0.04);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status-item.success {
      color: var(--ink);
      background: rgba(232, 213, 183, 0.28);
    }

    .status-item.error {
      color: var(--ink);
      background: rgba(232, 213, 183, 0.18);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 14px;
    }

    .tab-button {
      min-height: 38px;
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--muted);
      font-weight: 760;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .tab-button.is-active {
      border-color: transparent;
      background: var(--ink);
      color: var(--paper);
    }

    .closet-grid {
      min-height: 278px;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .closet-actions {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .closet-actions .button {
      min-width: 148px;
    }

    .closet-marquee {
      position: relative;
      overflow: hidden;
      padding: 4px 0 14px;
    }

    .closet-marquee-track {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
      overscroll-behavior-x: contain;
      padding: 0 2px 4px;
    }

    .closet-marquee-track::-webkit-scrollbar {
      display: none;
    }

    .closet-scroll-button {
      position: absolute;
      top: 50%;
      z-index: 4;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 50%;
      background: rgba(45, 45, 45, 0.62);
      color: var(--paper);
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) scale(0.94);
      transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease;
      backdrop-filter: blur(8px);
    }

    .closet-scroll-button:hover {
      background: rgba(45, 45, 45, 0.78);
      transform: translateY(-50%) scale(1);
    }

    .closet-scroll-button:disabled {
      opacity: 0 !important;
      pointer-events: none;
    }

    .closet-scroll-button.is-left {
      left: 8px;
    }

    .closet-scroll-button.is-right {
      right: 8px;
    }

    .closet-marquee:hover .closet-scroll-button,
    .closet-marquee:focus-within .closet-scroll-button {
      opacity: 1;
      pointer-events: auto;
    }

    .closet-marquee .clothes-card {
      width: clamp(180px, 34vw, 220px);
      flex: 0 0 clamp(180px, 34vw, 220px);
      scroll-snap-align: start;
    }

    .clothes-card,
    .outfit-item-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 10px 26px rgba(45, 45, 45, 0.08);
      animation: fadeIn 0.28s ease both;
    }

    .clothes-image-wrap,
    .outfit-image-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: rgba(232, 213, 183, 0.28);
    }

    .clothes-image,
    .outfit-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--image-radius);
      transform: scale(1);
      transition: transform 0.22s ease;
    }

    .clothes-card:hover .clothes-image,
    .outfit-item-card:hover .outfit-image {
      transform: scale(1.055);
    }

    .category-badge,
    .slot-badge {
      position: absolute;
      left: 8px;
      top: 8px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      font-size: 12px;
      font-weight: 820;
      box-shadow: 0 8px 16px rgba(45, 45, 45, 0.12);
    }

    .card-menu {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 3;
    }

    .menu-trigger {
      width: 32px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(45, 45, 45, 0.82);
      color: var(--paper);
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(45, 45, 45, 0.18);
    }

    .menu-panel {
      position: absolute;
      top: 38px;
      right: 0;
      min-width: 96px;
      display: none;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: var(--paper);
      box-shadow: var(--soft-shadow);
    }

    .clothes-card.is-menu-open .menu-panel {
      display: grid;
    }

    .menu-panel button {
      min-height: 34px;
      padding: 8px 10px;
      background: var(--paper);
      text-align: left;
      font-size: 13px;
    }

    .menu-panel button:hover {
      background: var(--mist);
    }

    .menu-panel .danger-text {
      color: var(--rose);
    }

    .clothes-body,
    .outfit-card-body {
      padding: 11px;
      display: grid;
      gap: 8px;
    }

    .clothes-name,
    .outfit-item-name {
      margin: 0;
      font-size: 15px;
      font-weight: 780;
      line-height: 1.35;
      word-break: break-word;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-tag {
      max-width: 100%;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(232, 213, 183, 0.32);
      color: var(--ink);
      font-size: 12px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .weather-scene {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(150px, 0.78fr) minmax(260px, 1.25fr);
      align-items: end;
      gap: 10px;
      margin: 12px 0 16px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: rgba(255, 255, 255, 0.72);
    }

    .weather-scene > * {
      min-width: 0;
    }

    .weather-scene .field-label {
      margin-bottom: 5px;
      font-size: 12px;
      opacity: 0.82;
    }

    .weather-scene .text-input {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 13px;
    }

    .weather-scene .button {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .weather-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: end;
    }

    .weather-card {
      min-height: 54px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: var(--paper);
      display: grid;
      gap: 5px;
    }

    .weather-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .temperature {
      font-size: 24px;
      font-weight: 820;
      line-height: 1;
    }

    .weather-desc {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .weather-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .weather-meta span {
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(45, 45, 45, 0.05);
    }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .scene-button {
      min-height: 44px;
      display: grid;
      place-items: center;
      grid-template-columns: auto 1fr;
      gap: 5px;
      padding: 6px 7px;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: var(--paper);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .scene-button:hover {
      transform: translateY(-2px) rotate(-0.5deg);
      box-shadow: var(--soft-shadow);
    }

    .scene-button.is-active {
      border-color: transparent;
      background: var(--ink);
      color: var(--paper);
    }

    .scene-mark {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--warm);
      color: var(--ink);
      font-size: 12px;
      font-weight: 860;
    }

    .outfit-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .outfit-stage {
      min-height: 300px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      overflow: hidden;
      transform-style: preserve-3d;
      transition: opacity 0.24s ease, transform 0.24s ease, filter 0.24s ease;
    }

    .outfit-stage.is-switching {
      opacity: 0.48;
      filter: saturate(0.78);
      transform: perspective(980px) rotateY(8deg) translateY(8px);
    }

    .outfit-hero {
      padding: 16px;
      background:
        radial-gradient(circle at 96% 14%, rgba(232, 213, 183, 0.42), transparent 110px),
        linear-gradient(135deg, rgba(232, 213, 183, 0.24), rgba(255, 255, 255, 0.92));
      border-bottom: 1px solid var(--line);
    }

    .outfit-hero h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    .outfit-reason {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .outfit-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .replace-button {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      min-height: 30px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(45, 45, 45, 0.9);
      color: var(--paper);
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(45, 45, 45, 0.18);
    }

    .missing-list {
      display: grid;
      gap: 7px;
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      color: var(--ink);
      line-height: 1.45;
      font-size: 13px;
    }

    .empty-state {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(232, 213, 183, 0.18)),
        rgba(255, 255, 255, 0.72);
      padding: 24px;
    }

    .empty-state h3 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    .empty-state p {
      max-width: 420px;
      margin: 0 auto 16px;
      color: var(--muted);
      line-height: 1.65;
    }

    .favorites-panel {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      overflow: hidden;
    }

    .favorites-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }

    .favorites-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .favorites-list {
      display: grid;
      gap: 8px;
      padding: 12px;
      max-height: 320px;
      overflow: auto;
    }

    .favorite-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: var(--paper);
      animation: fadeIn 0.24s ease both;
    }

    .favorite-apply {
      min-width: 0;
      display: grid;
      gap: 8px;
      padding: 0;
      background: transparent;
      text-align: left;
    }

    .favorite-thumbs {
      display: flex;
      gap: 6px;
      overflow: hidden;
    }

    .favorite-thumb {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(232, 213, 183, 0.28);
    }

    .favorite-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .favorite-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .favorite-title {
      font-weight: 780;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .favorite-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--muted);
      font-weight: 900;
    }

    dialog {
      border: 0;
      padding: 0;
      background: transparent;
    }

    dialog::backdrop {
      background: rgba(45, 45, 45, 0.35);
      backdrop-filter: blur(6px);
    }

    .modal-card {
      width: min(620px, calc(100vw - 28px));
      max-height: min(720px, calc(100vh - 28px));
      overflow: auto;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--paper), rgba(232, 213, 183, 0.22));
      box-shadow: 0 28px 80px rgba(45, 45, 45, 0.22);
    }

    .modal-header {
      padding: 18px 18px 0;
    }

    .modal-header h3 {
      margin-bottom: 6px;
      font-size: 20px;
    }

    .modal-header p {
      margin-bottom: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .modal-body {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
    }

    .preview-box {
      min-height: 180px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(232, 213, 183, 0.28), var(--paper));
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-two {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    .range-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 36px;
      gap: 10px;
      align-items: center;
    }

    .range-input {
      width: 100%;
      accent-color: var(--ink);
    }

    .warm-value {
      min-height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(232, 213, 183, 0.34);
      font-weight: 900;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 18px 18px;
    }

    .confirm-card {
      width: min(460px, calc(100vw - 28px));
      padding: 20px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--paper), rgba(232, 213, 183, 0.22));
      box-shadow: 0 28px 80px rgba(45, 45, 45, 0.22);
    }

    .confirm-card h3 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    .confirm-card p {
      margin-bottom: 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    #replaceDialog {
      inset: auto 0 0 auto;
      margin: 0;
      max-width: none;
      max-height: none;
    }

    .sheet-card {
      width: min(680px, 100vw);
      height: min(76vh, 740px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-radius: var(--radius) 0 0 0;
      background: linear-gradient(135deg, var(--paper), rgba(232, 213, 183, 0.22));
      box-shadow: -20px 0 60px rgba(45, 45, 45, 0.18);
    }

    .sheet-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .sheet-header h3 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .sheet-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .replace-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      overflow: auto;
      padding: 14px;
    }

    .replace-card {
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--soft-radius);
      background: var(--paper);
      text-align: left;
      animation: fadeIn 0.24s ease both;
    }

    .replace-card.is-active {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(232, 213, 183, 0.8);
    }

    .replace-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: var(--image-radius);
      background: rgba(232, 213, 183, 0.28);
    }

    .replace-card strong {
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 36px));
    }

    .toast {
      padding: 12px 14px;
      border: 1px solid rgba(45, 45, 45, 0.08);
      border-left: 5px solid var(--sage);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--soft-shadow);
      color: var(--ink);
      line-height: 1.45;
      animation: toastIn 0.22s ease both;
    }

    .toast.error {
      border-left-color: var(--rose);
    }

    .toast.warn {
      border-left-color: var(--warm-deep);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .app-shell {
        width: min(100% - 22px, 760px);
        padding-top: 12px;
      }

      .top-nav,
      .module-header,
      .weather-main {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-meta,
      .weather-desc {
        text-align: left;
      }

      .module-header .button {
        width: 100%;
      }

      .weather-scene {
        grid-template-columns: 1fr;
      }

      .outfit-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .closet-marquee .clothes-card {
        width: clamp(180px, 46vw, 220px);
        flex-basis: clamp(180px, 46vw, 220px);
      }

      .scene-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .modal-body {
        grid-template-columns: 1fr;
      }

      .preview-box {
        min-height: 240px;
      }

      #replaceDialog {
        inset: auto 0 0 0;
      }

      .sheet-card {
        width: 100vw;
        height: min(82vh, 720px);
        border-radius: var(--radius) var(--radius) 0 0;
      }
    }

    @media (max-width: 560px) {
      .closet-body,
      .outfit-body,
      .module-header {
        padding: 14px;
      }

      .weather-row,
      .outfit-toolbar {
        grid-template-columns: 1fr;
      }

      .weather-row {
        display: grid;
      }

      .button {
        width: 100%;
      }

      .replace-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modal-footer,
      .dialog-actions {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-nav">
      <h1>Outfit of The Day</h1>
      <p class="nav-meta" id="navMeta">正在读取本地衣橱。</p>
    </header>

    <main class="workspace">
      <section class="module closet-module" aria-labelledby="closetTitle">
        <div class="module-header">
          <div>
            <p class="eyebrow">我的衣橱</p>
            <h2 class="module-title" id="closetTitle">管理你的单品</h2>
            <p class="module-note">添加、编辑、删除和分类浏览，数据会保存在本机浏览器。</p>
          </div>
        </div>

        <div class="closet-body">
          <nav class="tabs" id="categoryTabs" aria-label="衣服分类"></nav>
          <div class="closet-grid" id="closetGrid"></div>
          <div class="closet-actions">
            <button class="button primary" id="toggleUploadBtn" type="button">添加单品</button>
          </div>
          <section class="upload-panel" id="uploadPanel" hidden>
            <div class="upload-panel-head">
              <p>衣橱补给站已开启，图片丢进来就能变成统一风格卡片。</p>
              <div class="data-menu" id="dataMenu">
                <button class="data-menu-trigger" id="dataMenuBtn" type="button" aria-label="打开数据管理菜单">···</button>
                <div class="data-menu-panel" id="dataMenuPanel">
                  <button type="button" id="exportDataBtn">导出数据</button>
                  <button type="button" id="importDataBtn">导入数据</button>
                  <div class="data-menu-divider" aria-hidden="true"></div>
                  <button class="danger-text" type="button" id="clearDataBtn">一键清空</button>
                </div>
              </div>
            </div>
            <button class="drop-zone" id="dropZone" type="button">
              <span>
                <strong>选择或拖拽衣服图片</strong>
                支持多张 JPG、PNG、WebP，上传后逐件确认分类和标签。
              </span>
            </button>
            <input class="hidden-input" id="fileInput" type="file" accept="image/*" multiple>
            <input class="hidden-input" id="importInput" type="file" accept="application/json,.json">
            <div class="progress-box" id="progressBox" hidden>
              <div class="progress-bar" aria-hidden="true">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <p class="progress-text" id="progressText"></p>
            </div>
            <ul class="status-list" id="statusList"></ul>
          </section>
        </div>
      </section>

      <section class="module outfit-module" aria-labelledby="outfitTitle">
        <div class="module-header">
          <div>
            <p class="eyebrow">今日穿搭</p>
            <h2 class="module-title" id="outfitTitle">天气和场景推荐</h2>
            <p class="module-note" id="closetCountText">衣橱共 0 件单品</p>
          </div>
        </div>

        <div class="outfit-body">
          <div class="outfit-toolbar">
            <button class="button primary" id="shuffleBtn" type="button">换一套</button>
            <button class="button warm" id="favoriteCurrentBtn" type="button">收藏这套穿搭</button>
          </div>

          <section class="outfit-stage" id="outfitStage" aria-live="polite"></section>

          <section class="weather-scene" aria-label="天气和场景选择">
            <div class="weather-row">
              <div>
                <label class="field-label" for="cityInput">城市</label>
                <input class="text-input" id="cityInput" list="cityOptions" type="search" autocomplete="off" placeholder="例如 Shanghai / 北京">
                <datalist id="cityOptions">
                  <option value="Shanghai"></option>
                  <option value="Beijing"></option>
                  <option value="Guangzhou"></option>
                  <option value="Shenzhen"></option>
                  <option value="Hangzhou"></option>
                  <option value="Chengdu"></option>
                  <option value="New York"></option>
                  <option value="London"></option>
                  <option value="Tokyo"></option>
                  <option value="Paris"></option>
                </datalist>
              </div>
              <button class="button primary" id="fetchWeatherBtn" type="button">获取天气</button>
            </div>

            <div class="weather-card" id="weatherCard">
              <div class="weather-main">
                <strong class="temperature">--</strong>
                <span class="weather-desc">等待城市天气</span>
              </div>
              <div class="weather-meta">
                <span>湿度 --</span>
                <span>风速 --</span>
              </div>
            </div>

            <div>
              <span class="field-label">场景</span>
              <div class="scene-grid" id="sceneGrid"></div>
            </div>
          </section>

          <section class="favorites-panel">
            <div class="favorites-header">
              <h3>收藏穿搭</h3>
              <button class="button secondary" id="toggleFavoritesBtn" type="button">收起</button>
            </div>
            <div class="favorites-list" id="favoritesList"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <dialog id="itemDialog">
    <form class="modal-card" id="itemForm">
      <div class="modal-header">
        <h3 id="itemDialogTitle">确认衣服信息</h3>
        <p id="itemDialogNote">编辑名称、分类和标签，标签会参与后续穿搭推荐。</p>
      </div>
      <div class="modal-body">
        <div class="preview-box">
          <img id="itemPreview" alt="衣服预览">
        </div>
        <div class="form-grid">
          <div>
            <label class="field-label" for="itemNameInput">名称</label>
            <input class="text-input" id="itemNameInput" type="text" maxlength="48" required>
          </div>
          <div>
            <label class="field-label" for="itemCategorySelect">分类</label>
            <select class="select-input" id="itemCategorySelect" required></select>
          </div>
          <div>
            <label class="field-label" for="itemTagsInput">标签</label>
            <input class="text-input" id="itemTagsInput" type="text" placeholder="白色, 通勤, 棉, 薄款">
          </div>
          <div class="form-two">
            <div>
              <label class="field-label" for="itemSeasonSelect">季节</label>
              <select class="select-input" id="itemSeasonSelect">
                <option value="四季">四季</option>
                <option value="春">春</option>
                <option value="夏">夏</option>
                <option value="秋">秋</option>
                <option value="冬">冬</option>
              </select>
            </div>
            <div>
              <label class="field-label" for="itemWarmLevelInput">保暖等级</label>
              <div class="range-row">
                <input class="range-input" id="itemWarmLevelInput" type="range" min="1" max="5" step="1">
                <span class="warm-value" id="warmLevelValue">3</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="button ghost" id="itemCancelBtn" type="button">取消</button>
        <button class="button primary" id="itemSaveBtn" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirmDialog">
    <div class="confirm-card">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button class="button secondary" id="confirmCancelBtn" type="button">取消</button>
        <button class="button danger" id="confirmOkBtn" type="button">确认</button>
      </div>
    </div>
  </dialog>

  <dialog id="replaceDialog">
    <div class="sheet-card">
      <div class="sheet-header">
        <div>
          <h3 id="replaceTitle">替换单品</h3>
          <p id="replaceNote">选择同分类单品替换当前穿搭中的这一件。</p>
        </div>
        <button class="icon-button" id="closeReplaceBtn" type="button" aria-label="关闭替换选择器">×</button>
      </div>
      <div class="replace-grid" id="replaceGrid"></div>
    </div>
  </dialog>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script>
    (() => {
      "use strict";

      const CANVAS_SIZE = 720;
      const STORAGE_KEYS = {
        items: "aiWardrobe.items",
        settings: "aiWardrobe.settings",
        favorites: "aiWardrobe.favoriteOutfits"
      };
      const CATEGORIES = ["全部", "上衣", "下装", "连衣裙", "外套", "鞋履", "配饰"];
      const ITEM_CATEGORIES = CATEGORIES.slice(1);
      const SCENES = [
        { id: "work", label: "上班", icon: "公", keywords: ["通勤", "正式", "简约", "衬衫", "西装", "西裤", "皮鞋", "中性色", "黑色", "白色", "灰色"] },
        { id: "date", label: "约会", icon: "心", keywords: ["时尚", "设计感", "连衣裙", "裙", "精致", "柔和", "亮色", "约会"] },
        { id: "vacation", label: "度假", icon: "行", keywords: ["休闲", "亮色", "舒适", "棉", "亚麻", "短裤", "凉鞋", "度假"] },
        { id: "sport", label: "运动", icon: "动", keywords: ["运动", "弹力", "透气", "速干", "卫衣", "运动鞋"] },
        { id: "home", label: "居家", icon: "家", keywords: ["居家", "柔软", "舒适", "宽松", "针织", "棉"] },
        { id: "party", label: "派对", icon: "夜", keywords: ["派对", "亮片", "设计感", "皮革", "高跟", "金属", "黑色"] }
      ];

      const dom = {
        navMeta: document.querySelector("#navMeta"),
        closetCountText: document.querySelector("#closetCountText"),
        toggleUploadBtn: document.querySelector("#toggleUploadBtn"),
        uploadPanel: document.querySelector("#uploadPanel"),
        dataMenu: document.querySelector("#dataMenu"),
        dataMenuBtn: document.querySelector("#dataMenuBtn"),
        exportDataBtn: document.querySelector("#exportDataBtn"),
        importDataBtn: document.querySelector("#importDataBtn"),
        clearDataBtn: document.querySelector("#clearDataBtn"),
        dropZone: document.querySelector("#dropZone"),
        fileInput: document.querySelector("#fileInput"),
        importInput: document.querySelector("#importInput"),
        progressBox: document.querySelector("#progressBox"),
        progressFill: document.querySelector("#progressFill"),
        progressText: document.querySelector("#progressText"),
        statusList: document.querySelector("#statusList"),
        categoryTabs: document.querySelector("#categoryTabs"),
        closetGrid: document.querySelector("#closetGrid"),
        cityInput: document.querySelector("#cityInput"),
        fetchWeatherBtn: document.querySelector("#fetchWeatherBtn"),
        weatherCard: document.querySelector("#weatherCard"),
        sceneGrid: document.querySelector("#sceneGrid"),
        shuffleBtn: document.querySelector("#shuffleBtn"),
        favoriteCurrentBtn: document.querySelector("#favoriteCurrentBtn"),
        outfitStage: document.querySelector("#outfitStage"),
        toggleFavoritesBtn: document.querySelector("#toggleFavoritesBtn"),
        favoritesList: document.querySelector("#favoritesList"),
        itemDialog: document.querySelector("#itemDialog"),
        itemForm: document.querySelector("#itemForm"),
        itemDialogTitle: document.querySelector("#itemDialogTitle"),
        itemDialogNote: document.querySelector("#itemDialogNote"),
        itemPreview: document.querySelector("#itemPreview"),
        itemNameInput: document.querySelector("#itemNameInput"),
        itemCategorySelect: document.querySelector("#itemCategorySelect"),
        itemTagsInput: document.querySelector("#itemTagsInput"),
        itemSeasonSelect: document.querySelector("#itemSeasonSelect"),
        itemWarmLevelInput: document.querySelector("#itemWarmLevelInput"),
        warmLevelValue: document.querySelector("#warmLevelValue"),
        itemCancelBtn: document.querySelector("#itemCancelBtn"),
        confirmDialog: document.querySelector("#confirmDialog"),
        confirmTitle: document.querySelector("#confirmTitle"),
        confirmMessage: document.querySelector("#confirmMessage"),
        confirmCancelBtn: document.querySelector("#confirmCancelBtn"),
        confirmOkBtn: document.querySelector("#confirmOkBtn"),
        replaceDialog: document.querySelector("#replaceDialog"),
        replaceTitle: document.querySelector("#replaceTitle"),
        replaceNote: document.querySelector("#replaceNote"),
        replaceGrid: document.querySelector("#replaceGrid"),
        closeReplaceBtn: document.querySelector("#closeReplaceBtn"),
        toastStack: document.querySelector("#toastStack")
      };

      const state = {
        items: normalizeItems(loadJson(STORAGE_KEYS.items, [])),
        settings: normalizeSettings(loadJson(STORAGE_KEYS.settings, {})),
        favorites: normalizeFavorites(loadJson(STORAGE_KEYS.favorites, [])),
        activeCategory: "全部",
        weather: null,
        currentOutfit: null,
        generationIndex: 0,
        weatherTimer: null,
        favoritesOpen: true
      };

      init();

      function init() {
        dom.itemCategorySelect.innerHTML = ITEM_CATEGORIES.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join("");
        bindEvents();
        renderAll();
        bootAutoOutfit();
      }

      function bindEvents() {
        dom.toggleUploadBtn.addEventListener("click", () => {
          dom.uploadPanel.hidden = !dom.uploadPanel.hidden;
          dom.toggleUploadBtn.textContent = dom.uploadPanel.hidden ? "添加单品" : "收起添加";
        });

        /* 数据管理入口藏在添加面板的更多菜单里，降低误触风险。 */
        dom.dataMenuBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          dom.dataMenu.classList.toggle("is-open");
        });
        dom.exportDataBtn.addEventListener("click", exportData);
        dom.importDataBtn.addEventListener("click", () => dom.importInput.click());
        dom.importInput.addEventListener("change", () => {
          const [file] = dom.importInput.files;
          if (file) handleImportFile(file);
          dom.importInput.value = "";
        });
        dom.clearDataBtn.addEventListener("click", clearAllData);
        /* 保暖等级滑块即时回显，便于用户快速判断 1-5 的厚薄程度。 */
        dom.itemWarmLevelInput.addEventListener("input", () => {
          dom.warmLevelValue.textContent = dom.itemWarmLevelInput.value;
        });

        dom.dropZone.addEventListener("click", () => dom.fileInput.click());

      function scrollCloset(direction) {
        /* 每次按当前卡片宽度加间距滚动一格，保持手动切换的节奏清晰。 */
        const track = dom.closetGrid.querySelector(".closet-marquee-track");
        const card = track?.querySelector(".clothes-card");
        if (!track || !card || !Number.isFinite(direction)) return;
        const gap = Number.parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap) || 12;
        const step = card.getBoundingClientRect().width + gap;
        if (track.scrollBy) track.scrollBy({ left: step * direction, behavior: "smooth" });
        else track.scrollLeft += step * direction;
        window.setTimeout(updateClosetScrollButtons, 280);
      }

      function updateClosetScrollButtons() {
        const track = dom.closetGrid.querySelector(".closet-marquee-track");
        const leftButton = dom.closetGrid.querySelector('[data-scroll-closet="-1"]');
        const rightButton = dom.closetGrid.querySelector('[data-scroll-closet="1"]');
        if (!track || !leftButton || !rightButton) return;
        const maxScroll = Math.max(0, track.scrollWidth - track.clientWidth);
        const canScroll = maxScroll > 2;
        leftButton.disabled = !canScroll;
        rightButton.disabled = !canScroll;
      }

      function getFavoriteDisplayItems(favorite) {

        return favorite.itemIds.map((itemId) => {
          const currentItem = state.items.find((item) => item.id === itemId);
          const snapshot = snapshots.find((item) => item.id === itemId);
          return currentItem || snapshot || null;
        }).filter(Boolean);

      async function bootAutoOutfit() {
        if (!state.items.length) return;
        const ok = await fetchWeather({ silent: true });
        if (ok) {
          generateOneOutfit({ requireDifferent: false, silent: true });
        } else {
          state.weather = createFallbackWeather();
          renderWeather();
